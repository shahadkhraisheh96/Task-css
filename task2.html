<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Dashboard</title>
    <link rel="stylesheet" href="task2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-item active">
            <i class="fas fa-th-large"></i>
            <span>Dashboard</span>
        </div>
        <div class="sidebar-item">
            <i class="fas fa-chart-line"></i>
            <span>Analytics</span>
        </div>
        <div class="sidebar-item">
            <i class="fas fa-envelope"></i>
            <span>Messages</span>
        </div>
        <div class="sidebar-item">
            <i class="fas fa-cog"></i>
            <span>Settings</span>
        </div>
    </aside>

    <main class="main-content">
        
        <header class="dashboard-header">
            <div class="header-left">
                <i class="fas fa-bars menu-toggle"></i>
                <h2>Dashboard</h2>
            </div>
            <div class="header-right">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search">
                </div>
                <img src="https://via.placeholder.com/35" alt="User" class="user-avatar">
            </div>
        </header>

        <section class="stats-container">
            <div class="stat-card">
                <div class="icon-box blue"><i class="fas fa-shopping-bag"></i></div>
                <div class="stat-info">
                    <h3>$7,500</h3>
                    <p>Total Sales</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="icon-box green"><i class="fas fa-user"></i></div>
                <div class="stat-info">
                    <h3>1,250</h3>
                    <p>New Users</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="icon-box orange"><i class="fas fa-box"></i></div>
                <div class="stat-info">
                    <h3>3,200</h3>
                    <p>Total Orders</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="icon-box red"><i class="fas fa-tools"></i></div>
                <div class="stat-info">
                    <h3>50</h3>
                    <p>Support Tickets</p>
                </div>
            </div>
        </section>

        <section class="table-section">
            <div class="table-header">
                <h3>Transactions</h3>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Status</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>#10001</td>
                            <td>John Doe</td>
                            <td><span class="badge paid">Paid</span></td>
                            <td>$120.00</td>
                        </tr>
                        <tr>
                            <td>#10002</td>
                            <td>Jane Smith</td>
                            <td><span class="badge pending">Pending</span></td>
                            <td>$75.00</td>
                        </tr>
                        <tr>
                            <td>#10003</td>
                            <td>Mike Johnson</td>
                            <td><span class="badge paid">Paid</span></td>
                            <td>$45.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

</body>
</html>
